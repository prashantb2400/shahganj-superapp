name: firebase_sdk
description: Shared repositories, realtime streams, background geolocator smoother, and OTP services for the Shahganj.online Firebase backend.
version: 1.0.0
publish_to: 'none'

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  core_models:
    path: ../core_models
  firebase_core: ^3.1.0
  cloud_firestore: ^5.0.1
  firebase_auth: ^5.1.0
  crypto: ^3.0.3
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.3

dev_dependencies:
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.0

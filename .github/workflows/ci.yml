name: Monorepo Continuous Integration

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  analyze_and_test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java Runtime (Android compilation requirement)
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Install Melos Globally
        run: dart pub global activate melos 6.0.0

      - name: Add Dart Pub path to Environment
        run: echo "$HOME/.pub-cache/bin" >> $GITHUB_PATH

      - name: Melos Workspace Bootstrap (Bootstrap dependencies cross packages)
        run: melos bootstrap

      - name: Run Dart Static Analyzer
        run: melos run analyze

      - name: Run Monorepo Package Unit Tests
        run: melos run test

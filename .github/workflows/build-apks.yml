name: Cloud APK Release Builder

on:
  push:
    tags:
      - 'v*' # Trigger build on release version tags e.g. v1.0.0

jobs:
  build_apks:
    name: Build Signed Android APKs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4

      - name: Setup Java JRE/JDK (Android Build)
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter SDK Environment
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Install Android SDK 35
        run: yes | sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Generate Android Integration Templates
        run: |
          rm -rf apps/customer/android apps/merchant/android
          cd apps/customer && flutter create . --platforms=android --org=online.shahganj
          cd ../merchant && flutter create . --platforms=android --org=online.shahganj

      - name: Patch Root build.gradle for Custom Properties
        run: |
          echo -e "\next {\n    compileSdkVersion = 35\n    targetSdkVersion = 35\n    minSdkVersion = 23\n}" >> apps/customer/android/build.gradle
          echo -e "\next {\n    compileSdkVersion = 35\n    targetSdkVersion = 35\n    minSdkVersion = 23\n}" >> apps/merchant/android/build.gradle

          # Replace dynamic flutter properties with hardcoded integer values to bypass null evaluation exceptions
          sed -i 's/flutter.compileSdkVersion/35/g' apps/customer/android/app/build.gradle
          sed -i 's/flutter.minSdkVersion/23/g' apps/customer/android/app/build.gradle
          sed -i 's/flutter.targetSdkVersion/35/g' apps/customer/android/app/build.gradle

          sed -i 's/flutter.compileSdkVersion/35/g' apps/merchant/android/app/build.gradle
          sed -i 's/flutter.minSdkVersion/23/g' apps/merchant/android/app/build.gradle
          sed -i 's/flutter.targetSdkVersion/35/g' apps/merchant/android/app/build.gradle

          # Upgrade Kotlin version in settings.gradle to ensure compatibility with Firebase dependencies
          sed -i 's/id "org.jetbrains.kotlin.android" version "[^"]*"/id "org.jetbrains.kotlin.android" version "1.9.22"/g' apps/customer/android/settings.gradle
          sed -i 's/id "org.jetbrains.kotlin.android" version "[^"]*"/id "org.jetbrains.kotlin.android" version "1.9.22"/g' apps/merchant/android/settings.gradle

      - name: Inject Google Services JSON for Customer App
        run: |
          mkdir -p apps/customer/android/app
          echo '${{ secrets.CUSTOMER_GOOGLE_SERVICES_JSON }}' > apps/customer/android/app/google-services.json

      - name: Inject Google Services JSON for Merchant App
        run: |
          mkdir -p apps/merchant/android/app
          echo '${{ secrets.MERCHANT_GOOGLE_SERVICES_JSON }}' > apps/merchant/android/app/google-services.json

      - name: Install Melos Global Package
        run: dart pub global activate melos 6.0.0

      - name: Add Path variables
        run: echo "$HOME/.pub-cache/bin" >> $GITHUB_PATH

      - name: Melos Workspace Bootstrap
        run: melos bootstrap

      - name: Generate Freezed & Serialized Files (build_runner)
        run: melos run build_all

      - name: Compile Signed Customer APK (online.shahganj.customer)
        run: |
          cd apps/customer
          flutter build apk --release --target-platform android-arm,android-arm64 --split-per-abi

      - name: Compile Signed Merchant APK (online.shahganj.merchant)
        run: |
          cd apps/merchant
          flutter build apk --release --target-platform android-arm,android-arm64 --split-per-abi

      - name: Upload Customer Build Artifacts to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: customer-release-apks
          path: apps/customer/build/app/outputs/flutter-apk/*.apk
          retention-days: 7

      - name: Upload Merchant Build Artifacts to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: merchant-release-apks
          path: apps/merchant/build/app/outputs/flutter-apk/*.apk
          retention-days: 7

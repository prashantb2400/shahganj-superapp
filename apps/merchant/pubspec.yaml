name: merchant
description: Shahganj.online Merchant & Rider App (APK 2). Android-first Flutter app.
version: 1.0.0
publish_to: 'none'

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  core_models:
    path: ../../packages/core_models
  firebase_sdk:
    path: ../../packages/firebase_sdk
  shared_widgets:
    path: ../../packages/shared_widgets
  
  # Firebase Core
  firebase_core: ^3.1.0
  firebase_auth: ^5.1.0
  cloud_firestore: ^5.0.1
  firebase_messaging: ^15.0.1
  
  # Routing & State
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.1
  
  # Wakelocks & Sounds (Rule 28 & 29)
  wakelock_plus: ^1.2.8
  audioplayers: ^6.0.0
  flutter_local_notifications: ^17.2.1
  
  # Maps & GPS (Riders tracking & geolocator)
  flutter_map: ^6.1.0
  latlong2: ^0.9.1
  geolocator: ^11.0.0
  
  # UI
  google_fonts: ^6.2.1

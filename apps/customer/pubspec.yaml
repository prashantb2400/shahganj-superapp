name: customer
description: Shahganj.online Customer Mobile App (APK 1). Android-first Flutter app.
version: 1.0.0
publish_to: 'none'

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  core_models:
    path: ../../packages/core_models
  firebase_sdk:
    path: ../../packages/firebase_sdk
  shared_widgets:
    path: ../../packages/shared_widgets
  
  # Firebase Core
  firebase_core: ^3.1.0
  firebase_auth: ^5.1.0
  cloud_firestore: ^5.0.1
  firebase_messaging: ^15.0.1
  
  # Routing & State
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.1
  
  # Maps & GPS
  flutter_map: ^6.1.0
  latlong2: ^0.9.1
  geolocator: ^11.0.0
  http: ^1.2.1
  
  # Local Caching
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # Payments
  razorpay_flutter: ^1.3.10
  
  # UI
  cached_network_image: ^3.3.1
  google_fonts: ^6.2.1
